<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla TS Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-app {
            width: 100%;
            max-width: 500px;
            height: 80vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.4;
        }

        .message-text {
            background-color: #e5e7eb;
            align-self: flex-start;
            color: #1f2937;
        }

        .message-mine {
            background-color: #3b82f6;
            color: white;
            align-self: flex-end;
        }

        .message-system {
            align-self: center;
            background: none;
            color: #6b7280;
            font-size: 0.85rem;
            padding: 4px;
        }

        .message-error {
            align-self: center;
            background-color: #fee2e2;
            border: 1px solid #fca5a5;
            font-size: 0.9rem;
        }

        .time {
            display: block;
            margin-top: 4px;
            opacity: 0.7;
        }

        #typing-indicator {
            padding: 0 20px 10px;
            font-size: 0.85rem;
            color: #6b7280;
            font-style: italic;
            display: none;
        }

        #chat-form {
            display: flex;
            padding: 15px;
            background: #f9fafb;
            border-top: 1px solid #e5e7eb;
        }

        #chat-input {
            flex-grow: 1;
            padding: 10px 15px;
            border: 1px solid #d1d5db;
            border-radius: 20px;
            outline: none;
            font-size: 1rem;
        }

        #chat-input:focus {
            border-color: #3b82f6;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 0 20px;
            margin-left: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>
<div id="chat-app">
    <div id="messages">
    </div>

    <div id="typing-indicator"></div>

    <form id="chat-form">
        <input
                type="text"
                id="chat-input"
                placeholder="Type a message..."
                autocomplete="off"
        />
        <button type="submit">Send</button>
    </form>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
